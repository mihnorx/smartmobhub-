<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - SmartMob Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --royal-purple: #6c63ff; --soft-white: #ffffff; --text-dark: #333; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--soft-white); margin: 0; color: var(--text-dark); }
        .container { max-width: 1200px; margin: 50px auto; padding: 20px; display: flex; gap: 50px; flex-wrap: wrap; }
        .product-image-container { flex: 1; min-width: 300px; text-align: center; }
        .main-img { width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .product-info { flex: 1; min-width: 300px; }
        .breadcrumb { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .product-title { font-size: 32px; font-weight: 600; margin-bottom: 15px; color: var(--text-dark); }
        .price-tag { font-size: 24px; color: var(--royal-purple); font-weight: 600; margin-bottom: 20px; }
        .description { line-height: 1.6; color: #666; margin-bottom: 30px; }
        .cart-action { display: flex; gap: 15px; align-items: center; margin-bottom: 40px; }
        .add-to-cart-btn { background: var(--royal-purple); color: white; padding: 15px 40px; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; transition: 0.3s; flex-grow: 1; }
        .add-to-cart-btn:hover { background: #554bc3; transform: translateY(-2px); }
        .reviews-container { width: 100%; margin-top: 50px; border-top: 1px solid #eee; padding-top: 40px; }
        .review-flex { display: flex; gap: 40px; flex-wrap: wrap; }
        .add-review-box { flex: 1; border: 2px solid var(--royal-purple); padding: 25px; border-radius: 10px; background: #fff; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="product-image-container">
        <!-- Broken image placeholder fixed by logic -->
        <img id="productImg" src="" alt="Product Image" class="main-img">
    </div>

    <div class="product-info">
        <div class="breadcrumb">Home / Mobile Accessories</div>
        <h1 id="productTitle" class="product-title">Loading...</h1>
        <div class="price-tag">Rs <span id="productPrice">0</span></div>
        <p class="description">
            High-quality mobile accessory designed for durability and high-energy performance. 
            Perfectly fits your modern lifestyle.
        </p>
        <!-- Is hissay ko wahan rakhein jahan description dikhani hai -->
<div class="product-features-container">
    <h2 id="productTitle" style="color: var(--royal-purple); margin-bottom: 5px;"></h2>
    <div style="font-size: 22px; font-weight: 600; color: #2d3436; margin-bottom: 20px;">
        Rs <span id="productPrice"></span>
    </div>

    <!-- Dynamic Features yahan show honge -->
    <div id="featureList" style="background: #f0efff; padding: 20px; border-radius: 15px; border-left: 5px solid var(--royal-purple);">
        <!-- JavaScript yahan features khud bharega -->
    </div>

    <div class="trust-badges" style="margin-top: 25px; font-size: 13px; color: #666; display: flex; gap: 15px; flex-wrap: wrap;">
        <span> Fast Shipping</span>
        <span> 7 Days Checking Warranty</span>
        <span> Premium Quality</span>
    </div>
</div>
        <div class="cart-action">
            <input type="number" id="qty" value="1" min="1" style="width: 60px; text-align: center; height: 45px; border-radius: 5px; border: 1px solid #ddd;">
            <button id="cartBtn" class="add-to-cart-btn" onclick="addToCart()">ADD TO CART</button>
        </div>
    </div>

    <div class="reviews-container">
        <h2 id="reviewCount">0 Reviews</h2>
        <div class="review-flex">
            <div id="reviewsList" style="flex: 2; min-width: 300px;">
                <p style="color: #888;">Loading reviews...</p>
            </div>
            
            <div class="add-review-box">
                <h3 style="margin-top: 0; color: #6c63ff;">Add a review</h3>
                <input type="text" id="revName" placeholder="Your Name *">
                <input type="email" id="revEmail" placeholder="Your Email *">
                <textarea id="revText" rows="5" placeholder="Your Review *"></textarea>
                <button class="add-to-cart-btn" onclick="submitReview()">SUBMIT REVIEW</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 1. DYNAMIC CONNECTION (Aapki Key ke sath)
    const _supabase = supabase.createClient('https://cxyxbwsosroeipdjyuuc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4eXhid3Nvc3JvZWlwZGp5dXVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDcxMzQsImV4cCI6MjA5MzE4MzEzNH0.8lI73RmCGGU3jQsiJxnyCMOe1NSaLWqvO3_1FBRZImM');

    // 2. SINGLE WINDOW ONLOAD
    window.onload = function() {
        const product = JSON.parse(localStorage.getItem('selectedProduct'));
        
        if (product) {
            // Product Image aur Titles set karna
            document.getElementById('productImg').src = product.image;
            document.getElementById('productTitle').innerText = product.name;
            document.getElementById('productPrice').innerText = product.price;

            // Smart Feature Recognition Logic
            const name = product.name.toLowerCase();
            let featuresHTML = "";
            if (name.includes("charger") || name.includes("adapter")) {
                featuresHTML = `<p><b> Super Fast Charging:</b> Supports 33W/65W power delivery.</p>
                                <p><b> Heat Protection:</b> Smart chip for battery safety.</p>
                                <p><b> Durable Cable:</b> Reinforced joints to prevent breakage.</p>`;
            } else if (name.includes("glass") || name.includes("protector")) {
                featuresHTML = `<p><b> 9H Hardness:</b> Ultimate scratch & drop protection.</p>
                                <p><b> Privacy Tech:</b> Screen invisible from side angles.</p>
                                <p><b> Smooth Touch:</b> Original screen feel with high sensitivity.</p>`;
            } else {
                featuresHTML = `<p><b> Premium Build:</b> Export quality material used.</p>
                                <p><b> Perfect Fit:</b> Guaranteed compatibility for your model.</p>
                                <p><b> Quality Tested:</b> Verified at Sultan Mobile Center.</p>`;
            }
            document.getElementById('featureList').innerHTML = featuresHTML;
        }

        // REVIEWS FETCH KARNA (Page load hote hi reviews load honge)
        loadReviews(); 
    };

// Database se reviews mangwane wala function
async function loadReviews() {
    const product = JSON.parse(localStorage.getItem('selectedProduct'));
    const currentProductName = product ? product.name : "";

    // Database se data fetch ho raha hai
    const { data: reviews, error } = await _supabase
        .from('reviews')
        .select('*')
        .eq('product_name', currentProductName) // Sirf is product ke reviews
        .order('created_at', { ascending: false });

    if (error) {
        console.error("Error loading reviews:", error);
        return;
    }

    const list = document.getElementById('reviewsList');
    const count = document.getElementById('reviewCount');
    
    if (reviews && reviews.length > 0) {
        count.innerText = `${reviews.length} Reviews`;
        list.innerHTML = reviews.map(r => `
            <div style="border-bottom: 1px solid #eee; padding: 15px 0; margin-bottom: 10px;">
                <strong style="color: #6c63ff;">${r.name || 'Anonymous'}</strong>
                <p style="margin: 5px 0; color: #444;">${r.comment}</p>
            </div>
        `).join('');
    } else {
        count.innerText = "0 Reviews";
        list.innerHTML = "<p>Abhi tak koi review nahi hai.</p>";
    }
}

    // 4. REVIEW SUBMIT KARNE KA FUNCTION
    async function submitReview() {
        const name = document.getElementById('revName').value;
        const email = document.getElementById('revEmail').value;
        const comment = document.getElementById('revText').value; 
        const product = JSON.parse(localStorage.getItem('selectedProduct'));

        if (!name || !comment) { 
            return alert("Please fill Name and Review fields!"); 
        }

        const { error } = await _supabase
            .from('reviews')
            .insert([{ 
                name: name, 
                email: email,
                comment: comment, 
                product_name: product ? product.name : "Unknown",
                rating: 5 
            }]);

        if (error) {
            console.error("Error saving review:", error);
            alert("Failed to save: " + error.message);
        } else {
            alert("Review saved successfully! ✅");
            location.reload(); 
        }
    }

    // 5. ADD TO CART FUNCTION
    async function addToCart() {
        const title = document.getElementById('productTitle').innerText;
        const priceText = document.getElementById('productPrice').innerText;
        const qty = document.getElementById('qty').value;
        const btn = document.getElementById('cartBtn');
        const cleanPrice = parseFloat(priceText.replace(/[^0-9.]/g, ''));

        btn.innerText = "SAVING...";
        btn.disabled = true;

        try {
            const { error } = await _supabase
                .from('orders')
                .insert([{ 
                    product_name: title, 
                    price: cleanPrice, 
                    qty: parseInt(qty),
                    created_at: new Date() 
                }]);

            if (error) throw error;
            alert("Order saved successfully! ✅");
            btn.innerText = "ADDED ✅";

            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push({ name: title, price: cleanPrice, qty: qty });
            localStorage.setItem('cart', JSON.stringify(cart));
        } catch (err) {
            alert("Backend Error: " + err.message);
            btn.innerText = "ADD TO CART";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
